<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>이사 견적 (VLM)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <style>
    body { background: #f4f6f9; min-height: 100vh; }
    .card { border: none; box-shadow: 0 0.125rem 0.5rem rgba(0,0,0,.06); }
    textarea.code { font-family: ui-monospace, monospace; font-size: 0.8rem; }
    #resultCard { display: none; }
    .thumb { max-height: 120px; border-radius: 0.35rem; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
      <span class="navbar-brand">이사 견적</span>
      <div class="navbar-nav">
        <a class="nav-link text-white-50" href="{{ url_for('index') }}">부피 추정 앱으로</a>
      </div>
    </div>
  </nav>

  <div class="container pb-5">
    <div class="row g-4">
      <div class="col-lg-6">
        <div class="card mb-3">
          <div class="card-body">
            <h1 class="h4 card-title">입력</h1>
            <p class="small text-muted">
              방 사진을 기반으로 짐을 인식해 견적을 생성합니다. 견적 보조 데이터가 있으면 이미지 인식 결과를 보완하는 후보 자료로 함께 사용합니다.
            </p>
            <form id="estForm" class="vstack gap-3" onsubmit="event.preventDefault(); return false;">
              <div>
                <label class="form-label">방 사진 (여러 장 선택)</label>
                <input class="form-control" type="file" id="images" name="images" accept="image/jpeg,image/png,image/webp" multiple>
                <div class="form-text">또는 폴더 전체(하위 포함)에서 이미지를 가져옵니다.</div>
                <input class="form-control mt-1" type="file" id="folderImages" accept="image/jpeg,image/png,image/webp" multiple webkitdirectory>
              </div>
              <div>
                <label class="form-label">VLM용 자연어 프롬프트 (선택)</label>
                <textarea class="form-control" id="userPrompt" rows="4" spellcheck="true"
                  placeholder="예: 침대는 퀸 사이즈로 가정해줘. 책은 무시하고 가구만 적어줘."></textarea>
              </div>
              <div>
                <label class="form-label">견적 보조 데이터 (선택)</label>
                <div class="border rounded p-3 bg-light">
                  <p class="small text-muted mb-3">
                    <code>quote.csv</code>를 넣으면 이미지 인식 결과에 대한 후보 자료로 사용합니다.
                    VLM이 사진에서 확인되는 품목만 반영하고, 없는 물건은 제외합니다.
                  </p>
                  <div class="mb-3">
                    <label class="form-label">quote.csv</label>
                    <input class="form-control" type="file" id="rmcQuote" accept="text/csv,.csv">
                  </div>
                  <div class="mb-3">
                    <label class="form-label">summary.json (선택)</label>
                    <input class="form-control" type="file" id="rmcSummary" accept="application/json,.json">
                  </div>
                  <div>
                    <label class="form-label">viz.json (선택)</label>
                    <input class="form-control" type="file" id="rmcViz" accept="application/json,.json">
                  </div>
                </div>
              </div>
              <div class="d-flex flex-wrap gap-2">
                <button type="button" class="btn btn-primary" id="btnGo">
                  <span class="spinner-border spinner-border-sm d-none me-1" id="spin"></span>
                  견적 생성
                </button>
                <button type="button" class="btn btn-outline-primary" id="btnPdf" disabled>
                  <span class="spinner-border spinner-border-sm d-none me-1" id="spinPdf"></span>
                  PDF 다운로드
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
      <div class="col-lg-6">
        <div class="card" id="resultCard">
          <div class="card-body">
            <h2 class="h5">견적서 (초안)</h2>
            <p class="small" id="metaLine"></p>
            <div id="thumbs" class="d-flex flex-wrap gap-2 mb-3"></div>
            <h3 class="h6">고객·일정</h3>
            <dl class="row small mb-3" id="whoBlock"></dl>
            <h3 class="h6">VLM 요약</h3>
            <p class="small border rounded p-2 bg-light" id="vlmSummary"></p>
            <h3 class="h6">품목</h3>
            <div class="table-responsive">
              <table class="table table-sm table-bordered" id="lineTable">
                <thead><tr><th>출처</th><th>이름</th><th>부피㎥</th><th>수</th><th>비고</th></tr></thead>
                <tbody></tbody>
              </table>
            </div>
            <h3 class="h6">요금 산출</h3>
            <ul class="small list-unstyled" id="feeList"></ul>
            <p class="fw-bold fs-5" id="totalLine"></p>
            <p class="small mb-2"><button type="button" class="btn btn-sm btn-outline-secondary" id="btnPdfAgain">PDF 다운로드</button></p>
          </div>
        </div>
        <div id="placeholderHint" class="text-muted small">견적 생성 후 이 영역에 결과가 표시됩니다.</div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="{{ url_for('static', filename='move_app.js') }}"></script>
</body>
</html>
